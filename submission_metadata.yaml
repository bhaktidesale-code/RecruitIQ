ai_usage_summary: |
  Used ChatGPT for understanding the submission specification, debugging Python/terminal issues, and improving the rule-based ranking approach. No hosted LLM API calls are used inside the ranking code, and candidate ranking runs fully offline on CPU.

methodology_summary: |
  We built a CPU-only rule-based ranking system for the Senior AI Engineer role. The ranker scores candidates using structured profile fields, career history, relevant AI/ML skills, production retrieval/ranking/search experience, vector database and evaluation-system exposure, location fit, notice period, and Redrob behavioral signals. It gives higher weight to candidates with 5-9 years of experience, Python, embeddings, retrieval, ranking, search, LLM, and product-engineering experience. It down-ranks inactive candidates, low recruiter-response candidates, long notice periods, consulting-only backgrounds, keyword-stuffed profiles, and honeypot-like skill inconsistencies.

